<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato | SaúdeMundo</title>
<meta name="description" content="Entre em contato com o SaúdeMundo. Dúvidas, sugestões ou parcerias.">
<link rel="canonical" href="https://saudemundo.com.br/contato.html">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9EPL2XNX6H"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9EPL2XNX6H');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .container { max-width: 600px; padding-top: 0; }
  .hero { text-align: center; margin-bottom: 40px; }
  .input-wrap {
    background: var(--dark3); border: 1px solid var(--border);
    border-radius: 10px; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--green-dark);
    box-shadow: 0 0 0 3px rgba(46,204,113,0.15);
  }
  .input-wrap input,
  .input-wrap textarea,
  .input-wrap select {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; padding: 14px 16px; resize: none;
  }
  .input-wrap select option { background: var(--dark2); }
  .input-wrap textarea { min-height: 120px; }
  .btn-send {
    width: 100%;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    border: none; border-radius: 12px; color: white; cursor: pointer;
    font-family: 'Playfair Display', serif; font-size: 1.1rem;
    font-weight: 700; padding: 18px; transition: all 0.3s; margin-top: 4px;
  }
  .btn-send:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(46,204,113,0.3); }
  .info-card {
    background: var(--dark3); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .info-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; font-size: 14px; color: var(--text-muted);
  }
  .info-row:last-child { margin-bottom: 0; }
  .info-icon { font-size: 20px; flex-shrink: 0; }
</style>
</head>
<body data-page="institucional">
<div class="bg-grid"></div>
<div class="container">
  <div class="hero">
    <div class="badge">✦ saudemundo · Fale conosco</div>
    <h1>Contato</h1>
    <p class="subtitle">Dúvidas, sugestões, reportar um problema ou propor uma parceria? Fale com a gente.</p>
  </div>
  <div class="card">
    <div class="card-title">✉️ Envie uma mensagem</div>
    <form action="https://formspree.io/f/xvzngqde" method="POST">
      <div class="field">
        <label>Seu nome</label>
        <div class="input-wrap"><input type="text" name="nome" placeholder="Como podemos te chamar?" required></div>
      </div>
      <div class="field">
        <label>E-mail para resposta</label>
        <div class="input-wrap"><input type="email" name="email" placeholder="seu@email.com" required></div>
      </div>
      <div class="field">
        <label>Assunto</label>
        <div class="input-wrap">
          <select name="assunto" required>
            <option value="">Selecione um assunto…</option>
            <option value="duvida">Dúvida sobre as calculadoras</option>
            <option value="bug">Reportar um problema</option>
            <option value="sugestao">Sugestão de melhoria</option>
            <option value="parceria">Proposta de parceria</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Mensagem</label>
        <div class="input-wrap"><textarea name="mensagem" placeholder="Descreva sua mensagem…" required></textarea></div>
      </div>
      <button type="submit" class="btn-send">Enviar mensagem →</button>
    </form>
  </div>
  <div class="info-card">
    <div class="info-row"><span class="info-icon">⏰</span><span>Respondemos em até <strong style="color:var(--text)">2 dias úteis</strong></span></div>
    <div class="info-row"><span class="info-icon">📧</span><span>Ou envie direto para <a href="mailto:contato@saudemundo.com.br" style="color:var(--green-dark)">contato@saudemundo.com.br</a></span></div>
    <div class="info-row"><span class="info-icon">🔒</span><span>Seus dados são tratados conforme nossa <a href="privacidade.html" style="color:var(--green-dark)">Política de Privacidade</a></span></div>
  </div>
</div>
<script src="shared.js"></script>
</body>
</html>
